<!DOCTYPE html>

<head>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#f5f7fa;padding:40px;max-width:1200px;margin:0 auto}
        h1{color:#222;margin-bottom:30px;border-left:5px solid #409eff;padding-left:15px}
        .demo-card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 6px #e5e7eb}
        .title{font-size:18px;font-weight:bold;color:#1f2937;margin-bottom:8px}
        .info{color:#666;font-size:14px;margin-bottom:12px}
        .btn{display:inline-block;padding:8px 16px;background:#409eff;color:#fff;text-decoration:none;border-radius:4px}
        .btn:hover{background:#337ecc}
        .tip{margin-top:40px;padding:16px;background:#e8f3ff;border-radius:6px;color:#2d69b3}

<body>
    <h1>产品原型HTML Demo 统一查看平台</h1>

    <!-- 新增原型复制下面卡片修改 -->
    <div class="demo-card">
        <div class="title">【示例】20260616_会员中心改版_v1.0</div>
        <div class="info">更新人：黄浩淇 | 更新时间：2026-06-16 | 修改内容：会员首页、充值弹窗</div>
        <a href="./20260616_会员中心改版_v1.0/index.html" class="btn">打开原型</a>

    <div class="tip">
        使用规范：
        1. 新版本原型新建独立文件夹，命名：日期_需求名_v版本

        3. 更新后修改本index.html，在最顶部新增卡片置顶最新版本
        4. 更新完成后去「服务-Gitee Pages」手动点击更新部署
